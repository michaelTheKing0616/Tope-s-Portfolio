name: Build SPORTVERSE database

on:
  workflow_dispatch:
    inputs:
      use_archive:
        description: "Download full TM archive from SPORTVERSE_ARCHIVE_URL secret (if set)"
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "sportverse/packages/sports-db/**"
      - ".github/workflows/build-sports-db.yml"
  schedule:
    # Weekly refresh — football-datasets + TM CDN
    - cron: "0 4 * * 0"

concurrency:
  group: sports-db-build
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Optional — fetch full Transfermarkt archive
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_archive == true }}
        env:
          ARCHIVE_URL: ${{ secrets.SPORTVERSE_ARCHIVE_URL }}
        run: node scripts/download-archive-url.mjs

      - name: Build sports-db JSON (ETL)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: node scripts/seed-external-data.mjs --clone --build --tm-cdn-fallback

      - name: Verify required artifacts
        run: node scripts/netlify-prebuild.mjs
        env:
          SKIP_DATA_SEED: "1"

      - name: Package tarball for release
        run: node scripts/package-sports-db.mjs

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: sports-db-data
          path: sports-db-data.tar.gz
          retention-days: 90

      - name: Publish GitHub Release bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sports-db-latest
          name: SPORTVERSE database (latest)
          body: Auto-built JSON bundle for Netlify deploy. Rebuilt by GitHub Actions.
          files: sports-db-data.tar.gz
          overwrite_files: true
          make_latest: true

name: Build SPORTVERSE database

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "sportverse/packages/sports-db/**"
      - ".github/workflows/build-sports-db.yml"
  schedule:
    # Weekly refresh
    - cron: "0 4 * * 0"

concurrency:
  group: sports-db-build
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Transfermarkt archive from Google Drive
        env:
          ARCHIVE_URL: ${{ secrets.SPORTVERSE_ARCHIVE_URL }}
        run: |
          if [ -z "$ARCHIVE_URL" ]; then
            echo "::warning::SPORTVERSE_ARCHIVE_URL secret is not set."
            echo "CI will build the smaller football-datasets + TM CDN pool only."
            echo "Add your Google Drive share link as secret SPORTVERSE_ARCHIVE_URL for the full archive."
            exit 0
          fi
          echo "→ SPORTVERSE_ARCHIVE_URL is set — downloading archive…"
          python3 -m pip install -q gdown
          node scripts/download-archive-url.mjs
          echo "Archive CSV files: $(find sportverse/archive -name '*.csv' | wc -l)"
          ls -lh sportverse/archive/player_profiles/player_profiles.csv

      - name: Build sports-db JSON (ETL)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: node scripts/seed-external-data.mjs --clone --build --tm-cdn-fallback

      - name: Verify required artifacts
        run: node scripts/verify-sports-db-artifacts.mjs

      - name: Install SPORTVERSE dependencies
        run: npm install
        working-directory: sportverse

      - name: Package tarball for release
        run: node scripts/package-sports-db.mjs

      - name: Verify sportverse-cdn chunks for browser proxy
        run: |
          test -f sportverse-cdn/season-stats.chunks.json
          test -f sportverse-cdn/players-extended.chunks.json
          ls -lh sportverse-cdn/ | head -20

      - name: Verify release bundle size
        run: node scripts/verify-sports-db-artifacts.mjs --tarball sports-db-data.tar.gz

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: sports-db-data
          path: sports-db-data.tar.gz
          retention-days: 90

      - name: Publish GitHub Release bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sports-db-latest
          name: SPORTVERSE database (latest)
          body: Auto-built JSON bundle for Netlify deploy. Rebuilt by GitHub Actions.
          files: |
            sports-db-data.tar.gz
            sportverse-cdn/**
          overwrite_files: true
          make_latest: true

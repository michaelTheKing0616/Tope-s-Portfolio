[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/play/sportverse"
  to = "/play/sportverse/"
  status = 301

[[headers]]
  for = "/play/sportverse/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  NODE_VERSION = "20"
  # Set your deployed URL in Netlify UI, or uncomment and replace:
  # PUBLIC_SITE_URL = "https://your-site.netlify.app"

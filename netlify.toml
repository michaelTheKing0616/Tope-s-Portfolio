[build]
  # Seeds DRAFTBALLER data (football-datasets + TM CDN), builds SPORTVERSE, then Astro site.
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/play/sportverse"
  to = "/play/sportverse/"
  status = 301

# Hashed JS/CSS — long cache
[[headers]]
  for = "/play/sportverse/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Game data JSON — short cache so redeploys pick up fresh ETL output
[[headers]]
  for = "/play/sportverse/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/play/sportverse/data/chunks/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Large gzip sports-db chunks — baked into dist/api/sports-db/ at build time (~22 MB total)
[[headers]]
  for = "/api/sports-db/*.json.gz"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/api/sports-db/*.chunks.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  SPORTS_DB_REPO = "michaelTheKing0616/Tope-s-Portfolio"
  VITE_SPORTS_DB_CDN = "/api/sports-db"

[build]
  # Seeds DRAFTBALLER data (football-datasets + TM CDN), builds SPORTVERSE, then Astro site.
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/play/sportverse"
  to = "/play/sportverse/"
  status = 301

# Hashed JS/CSS — long cache
[[headers]]
  for = "/play/sportverse/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Game data JSON — short cache so redeploys pick up fresh ETL output
[[headers]]
  for = "/play/sportverse/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/play/sportverse/data/chunks/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"

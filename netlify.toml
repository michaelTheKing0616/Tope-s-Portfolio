[build]
  # Seeds DRAFTBALLER data (football-datasets + TM CDN), builds SPORTVERSE, then Astro site.
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/play/sportverse"
  to = "/play/sportverse/"
  status = 301

[[redirects]]
  from = "/api/sports-db/:file"
  to = "/.netlify/functions/sports-db-gz?file=:file"
  status = 200
  force = true

# Hashed JS/CSS — long cache
[[headers]]
  for = "/play/sportverse/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Game data JSON — short cache so redeploys pick up fresh ETL output
[[headers]]
  for = "/play/sportverse/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/play/sportverse/data/chunks/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  SPORTS_DB_REPO = "michaelTheKing0616/Tope-s-Portfolio"
  VITE_SPORTS_DB_CDN = "/api/sports-db"

[functions.sports-db-gz]
  timeout = 26
